<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ЕМОДЖИ ЛОГИКА</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scanlines"></div>
  <div class="crt-vignette"></div>

  <!-- ██ SCREEN: WELCOME ██ -->
  <div id="screen-welcome" class="screen active">
    <div class="welcome-outer">

      <div class="arcade-header">
        <div class="header-ticker">— ВМЪКНИ МОНЕТА — НАТИСНИ СТАРТ — ВМЪКНИ МОНЕТА — НАТИСНИ СТАРТ —</div>
      </div>

      <div class="title-block">
        <div class="title-icon">🎭</div>
        <h1 class="game-title">ЕМОДЖИ<br><span class="title-accent">ЛОГИКА</span></h1>
        <p class="title-sub">// РАЗЧЕТИ КОДА //</p>
      </div>

      <!-- DIFFICULTY -->
      <div class="panel">
        <div class="panel-label">▶ ТРУДНОСТ</div>
        <div class="diff-row">
          <button class="diff-btn active" data-diff="easy" onclick="setDiff(this)">
            <span class="diff-key">01</span>
            <span class="diff-name">ЛЕСНО</span>
            <span class="diff-sub">60СЕК / 4 ОТГ</span>
          </button>
          <button class="diff-btn" data-diff="medium" onclick="setDiff(this)">
            <span class="diff-key">02</span>
            <span class="diff-name">СРЕДНО</span>
            <span class="diff-sub">45СЕК / 4 ОТГ</span>
          </button>
          <button class="diff-btn" data-diff="hard" onclick="setDiff(this)">
            <span class="diff-key">03</span>
            <span class="diff-name">ТРУДНО</span>
            <span class="diff-sub">30СЕК / 2 ОТГ</span>
          </button>
        </div>
      </div>

      <!-- CATEGORIES -->
      <div class="panel">
        <div class="panel-label">▶ КАТЕГОРИИ <span class="sel-count" id="sel-count">[ВСИЧКИ]</span></div>
        <div class="cat-grid" id="cat-filter">
          <button class="cat-btn active" data-cat="all"         onclick="toggleCat(this)">🌐 ВСИЧКИ</button>
          <button class="cat-btn"        data-cat="🎬 Филми"    onclick="toggleCat(this)">🎬 ФИЛМИ</button>
          <button class="cat-btn"        data-cat="🎮 Игри"     onclick="toggleCat(this)">🎮 ИГРИ</button>
          <button class="cat-btn"        data-cat="🏢 Компании" onclick="toggleCat(this)">🏢 КОМПАНИИ</button>
          <button class="cat-btn"        data-cat="🌍 Държави"  onclick="toggleCat(this)">🌍 ДЪРЖАВИ</button>
          <button class="cat-btn"        data-cat="🎵 Музика"   onclick="toggleCat(this)">🎵 МУЗИКА</button>
          <button class="cat-btn"        data-cat="⚽ Спорт"    onclick="toggleCat(this)">⚽ СПОРТ</button>
          <button class="cat-btn"        data-cat="🔬 Наука"    onclick="toggleCat(this)">🔬 НАУКА</button>
        </div>
      </div>

      <!-- NAME + START -->
      <div class="panel start-panel">
        <div class="panel-label">▶ ИГРАЧ</div>
        <div class="input-row">
          <span class="input-prefix">$_</span>
          <input id="initials-input" type="text" placeholder="ТВОЯТ ПСЕВДОНИМ" maxlength="12" autocomplete="off" spellcheck="false" />
        </div>
        <button id="btn-start" onclick="startGame()">
          [ СТАРТ ]
        </button>
        <button class="btn-secondary" onclick="showLeaderboard()">
          [ 🏆 КЛАСАЦИЯ ]
        </button>
      </div>

      <!-- STATS BAR -->
      <div class="stats-bar">
        <div class="stat-block"><span class="s-val" id="stat-time">60</span><span class="s-key">СЕК</span></div>
        <span class="stat-sep">//</span>
        <div class="stat-block"><span class="s-val">10</span><span class="s-key">ЗАДАЧИ</span></div>
        <span class="stat-sep">//</span>
        <div class="stat-block"><span class="s-val">60+</span><span class="s-key">ВЪПРОСА</span></div>
      </div>

    </div>
  </div>

  <!-- ██ SCREEN: GAME ██ -->
  <div id="screen-game" class="screen">
    <div class="game-shell">

      <!-- TOP STATUS BAR -->
      <div class="status-bar">
        <div class="status-player" id="player-tag">P1</div>
        <div class="status-mid">
          <div class="round-blocks" id="round-blocks"></div>
          <span class="round-label" id="progress-txt">01/10</span>
        </div>
        <div class="status-score">
          <span class="score-label">PTS</span>
          <span class="score-val" id="score-value">000000</span>
        </div>
      </div>

      <!-- TIMER BAR -->
      <div class="timer-bar">
        <span class="timer-label">ВРЕМЕ</span>
        <div class="timer-blocks" id="timer-blocks"></div>
        <span class="timer-num" id="timer-text">60</span>
      </div>

      <!-- PUZZLE ARENA -->
      <div class="puzzle-arena">
        <div class="arena-meta">
          <span class="meta-cat" id="cat-badge">КАТ</span>
          <span class="meta-diff" id="diff-chip">ЛЕСНО</span>
          <button class="hint-pill" id="hint-btn" onclick="useHint()">💡 ПОДСКАЗКА</button>
        </div>
        <div class="puzzle-box" id="puzzle-display"></div>
        <div class="puzzle-sub" id="puzzle-hint"></div>
      </div>

      <!-- ANSWER BUTTONS -->
      <div class="answer-zone" id="answers-grid"></div>

      <!-- BOTTOM HUD -->
      <div class="bottom-hud">
        <div class="feedback-line" id="feedback-bar"></div>
        <div class="streak-display">
          <span class="streak-label">🔥 СЕРИЯ</span>
          <span class="streak-val" id="streak-count">0</span>
        </div>
      </div>

    </div>
    <div class="combo-blast" id="combo-overlay"></div>
  </div>

  <!-- ██ SCREEN: GAME OVER ██ -->
  <div id="screen-gameover" class="screen">
    <div class="gameover-shell">
      <div class="go-flash" id="gameover-emoji">🏆</div>
      <div class="go-title" id="gameover-title">БРАВО!</div>
      <div class="go-msg" id="gameover-msg"></div>
      <div class="go-score-block">
        <div class="go-score-label">КРАЕН РЕЗУЛТАТ</div>
        <div class="go-score-val" id="final-score">000000</div>
        <div class="go-score-unit">ТОЧКИ</div>
      </div>
      <div class="go-grid" id="go-stats"></div>
      <button class="btn-start" onclick="playAgain()">[ 🔄 ИГРАЙ ОТНОВО ]</button>
      <button class="btn-secondary" onclick="showLeaderboard()">[ 🏆 КЛАСАЦИЯ ]</button>
    </div>
  </div>

  <!-- ██ SCREEN: LEADERBOARD ██ -->
  <div id="screen-leaderboard" class="screen">
    <div class="lb-shell">
      <div class="lb-title">🏆 ТОП 10</div>
      <div class="lb-tabs">
        <button class="lb-tab active" onclick="switchLbTab(this,'easy')">ЛЕСНО</button>
        <button class="lb-tab"       onclick="switchLbTab(this,'medium')">СРЕДНО</button>
        <button class="lb-tab"       onclick="switchLbTab(this,'hard')">ТРУДНО</button>
      </div>
      <div class="lb-table" id="lb-list"></div>
      <button class="btn-secondary full-w" onclick="showWelcome()">[ ← НАЗАД ]</button>
    </div>
  </div>

  <!-- AUDIO -->
  <script>
  const SFX = (() => {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    function tone(freq, type, dur, vol=0.18) {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(vol, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      o.start(); o.stop(ctx.currentTime + dur);
    }
    return {
      resume() { if (ctx.state==='suspended') ctx.resume(); },
      correct() { tone(520,'sine',0.1); setTimeout(()=>tone(780,'sine',0.15),80); },
      wrong()   { tone(180,'sawtooth',0.2,0.14); },
      combo()   { [440,550,660,880].forEach((f,i)=>setTimeout(()=>tone(f,'sine',0.12,0.2),i*60)); },
      tick()    { tone(880,'square',0.04,0.06); },
      hint()    { tone(350,'sine',0.12,0.1); setTimeout(()=>tone(500,'sine',0.1,0.1),100); }
    };
  })();
  </script>
  <script src="puzzles.js"></script>
  <script src="game.js"></script>
</body>
</html>
